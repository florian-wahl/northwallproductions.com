<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#07090f"/>

  <!-- Subtle frame -->
  <rect x="40" y="40" width="1120" height="550" rx="8" fill="none" stroke="#5cb8e8" stroke-width="1" opacity="0.25"/>

  <!-- Logo scaled to 200×200, centered at (600, 250) -->
  <!-- transform: new = scale*local + translate → tx=500, ty=150 to center local (20,20) at (600,250) -->
  <g transform="translate(500, 150) scale(5)">
    <polygon points="20,2 35,11 35,29 20,38 5,29 5,11" stroke="#f8f8f8" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    <line x1="20" y1="8"  x2="20" y2="32" stroke="#f8f8f8" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="8"  y1="14" x2="32" y2="26" stroke="#f8f8f8" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="32" y1="14" x2="8"  y2="26" stroke="#f8f8f8" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="2.8" fill="#5cb8e8"/>
  </g>

  <!-- NORTHWALL -->
  <text x="600" y="430" text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-weight="700" font-size="90" fill="#f8f8f8" letter-spacing="8">NORTHWALL</text>

  <!-- PRODUCTIONS -->
  <text x="600" y="510" text-anchor="middle"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-weight="300" font-size="36" fill="#5cb8e8" letter-spacing="18">PRODUCTIONS</text>
</svg>
