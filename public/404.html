<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>NorthWall Productions</title>
    <!--
      Single Page App redirect for GitHub Pages.
      When a user navigates directly to a route like /projects/the-long-winter,
      GitHub Pages serves this 404.html. The script below encodes the path and
      redirects to index.html where the app's React Router handles it.
      Source: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 0; // 0 = custom domain (northwallproductions.com)

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
