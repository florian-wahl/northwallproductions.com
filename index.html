<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NorthWall Productions — Independent film and television production company specializing in northern-set narratives." />
    <meta name="theme-color" content="#07090f" />

    <!-- Open Graph -->
    <meta property="og:title" content="NorthWall Productions" />
    <meta property="og:description" content="Independent film and television production company specializing in northern-set narratives." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://northwallproductions.com" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      GitHub Pages SPA redirect handler.
      This works in tandem with public/404.html to support client-side routing
      on GitHub Pages. See: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>

    <title>NorthWall Productions</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
